name: Deploy
on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECS_CLUSTER: chat-to-wiki
  ECS_SERVICE_API: chat-to-wiki-api
  ECS_SERVICE_FRONTEND: chat-to-wiki-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push API image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/chat-to-wiki-api:latest .
          docker push ${{ env.ECR_REGISTRY }}/chat-to-wiki-api:latest

      - name: Deploy API to ECS
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_API }} --force-new-deployment

      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: packages/backend
